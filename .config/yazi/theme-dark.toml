[flavor]
use = "catppuccin-mocha"

[manager]
cwd             = { fg = "#7aa2f7" }
hovered         = { fg = "#c0caf5", bg = "#283457", bold = true }
previewed       = { bg = "#1e2030" }
count_copied    = { fg = "#9ece6a" }
count_cut       = { fg = "#f7768e" }
count_selected  = { fg = "#e0af68" }
border_symbol   = "│"
border_style    = { fg = "#414868" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#33467c", bg = "#33467c" }
mode_normal     = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
mode_select     = { fg = "#1a1b26", bg = "#9ece6a", bold = true }
mode_unset      = { fg = "#1a1b26", bg = "#f7768e", bold = true }
progress_label  = { fg = "#c0caf5", bold = true }
progress_normal = { fg = "#7aa2f7", bg = "#1a1b26" }
progress_error  = { fg = "#f7768e", bg = "#1a1b26" }
permissions_t   = { fg = "#9ece6a" }
permissions_r   = { fg = "#e0af68" }
permissions_w   = { fg = "#f7768e" }
permissions_x   = { fg = "#9ece6a" }
permissions_s   = { fg = "#414868" }

[input]
border   = { fg = "#7aa2f7" }
title    = { fg = "#7aa2f7" }
value    = { fg = "#c0caf5" }
selected = { reversed = true }

[select]
border   = { fg = "#7aa2f7" }
active   = { fg = "#bb9af7" }
inactive = { fg = "#414868" }

[which]
cols            = 3
mask            = { bg = "#1a1b26" }
cand            = { fg = "#7dcfff" }
rest            = { fg = "#414868" }
desc            = { fg = "#bb9af7" }
separator       = "  "
separator_style = { fg = "#414868" }

[notify]
title_info  = { fg = "#9ece6a" }
title_warn  = { fg = "#e0af68" }
title_error = { fg = "#f7768e" }
icon_info   = ""
icon_warn   = ""
icon_error  = ""

[help]
on      = { fg = "#7aa2f7" }
exec    = { fg = "#9ece6a" }
desc    = { fg = "#a9b1d6" }
hovered = { fg = "#c0caf5", bg = "#283457", bold = true }
footer  = { fg = "#414868", bg = "#1a1b26" }

[filetype]
rules = [
  { mime = "image/*",                      fg = "#7dcfff" },
  { mime = "video/*",                      fg = "#bb9af7" },
  { mime = "audio/*",                      fg = "#bb9af7" },
  { mime = "application/zip",              fg = "#f7768e" },
  { mime = "application/gzip",             fg = "#f7768e" },
  { mime = "application/x-tar",            fg = "#f7768e" },
  { mime = "application/x-bzip2",          fg = "#f7768e" },
  { mime = "application/x-7z-compressed",  fg = "#f7768e" },
  { mime = "application/x-rar",            fg = "#f7768e" },
  { name = "*.toml", fg = "#e0af68" },
  { name = "*.yaml", fg = "#7aa2f7" },
  { name = "*.yml",  fg = "#7aa2f7" },
  { name = "*.json", fg = "#e0af68" },
  { name = "*.md",   fg = "#9ece6a" },
  { name = "*",      fg = "#a9b1d6" },
]
